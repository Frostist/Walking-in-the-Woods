<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Test - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            /* Prevent touch scrolling on mobile */
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        
        #info h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }
        
        #info ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        
        #info li {
            margin: 3px 0;
            font-size: 12px;
        }
        
        /* Hide mobile controls on desktop */
        @media (min-width: 769px) {
            #joystick-area,
            #camera-area,
            #sprint-button,
            #camera-toggle-button {
                display: none !important;
            }
        }
        
        /* Ensure mobile controls are visible on mobile */
        @media (max-width: 768px) {
            #joystick-area,
            #camera-area,
            #sprint-button,
            #camera-toggle-button {
                display: block;
            }
            
            #sprint-button,
            #camera-toggle-button {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        <h3>3D Forest Walk</h3>
        <div id="connection-status" style="margin-bottom: 8px;">
            <span id="status-dot" style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; background-color: #ff0000;"></span>
            <span id="status-text" style="font-size: 12px;">Disconnected</span>
        </div>
        <ul>
            <li>Click to lock mouse</li>
            <li>WASD - Move</li>
            <li>Shift - Sprint</li>
            <li>Mouse - Look around</li>
            <li>V - Toggle first/third person camera</li>
        </ul>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
