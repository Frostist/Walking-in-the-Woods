<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glock Wizards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
        }
        
        #app {
            width: 100vw;
            height: 100vh;
        }
        
        /* Mobile message styling */
        #mobile-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
        }
        
        #mobile-message .message-content {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        
        #mobile-message h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        #mobile-message p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
