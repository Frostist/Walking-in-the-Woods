<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Awesome Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        
        #info h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }
        
        #info ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        
        #info li {
            margin: 3px 0;
            font-size: 12px;
        }
        
        #hearts-container {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 100;
        }
        
        /* Mobile message styling */
        #mobile-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
        }
        
        #mobile-message .message-content {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        
        #mobile-message h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        #mobile-message p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        <h3>Controls</h3>
        <div id="connection-status" style="margin-bottom: 8px;">
            <span id="status-dot" style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; background-color: #ff0000;"></span>
            <span id="status-text" style="font-size: 12px;">Disconnected</span>
        </div>
        <ul>
            <li>Click to lock mouse</li>
            <li>WASD - Move</li>
            <li>Shift - Sprint</li>
            <li>Mouse - Look around</li>
            <li>V - Toggle first/third person camera</li>
            <li>L - Toggle leaderboard</li>
        </ul>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
