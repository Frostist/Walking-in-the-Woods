<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game VR - Meta Quest 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #vr-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            max-width: 300px;
            display: none;
        }
        
        #vr-info.visible {
            display: block;
        }
        
        #vr-info h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        #vr-info ul {
            list-style: none;
            padding-left: 0;
        }
        
        #vr-info li {
            margin-bottom: 5px;
            padding-left: 20px;
            position: relative;
        }
        
        #vr-info li:before {
            content: "•";
            position: absolute;
            left: 0;
        }
        
        #enter-vr-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: none;
        }
        
        #enter-vr-button:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        #enter-vr-button.visible {
            display: block;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        #loading-screen h1 {
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        #loading-bar-container {
            width: 400px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.3s ease;
            border-radius: 15px;
        }
        
        #loading-status {
            font-size: 16px;
            color: #ccc;
        }
        
        #loading-percentage {
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="vr-info" class="visible">
        <h3>VR Controls</h3>
        <ul>
            <li>Left Thumbstick - Move</li>
            <li>Right Thumbstick - Turn (optional)</li>
            <li>Right Trigger - Shoot</li>
            <li>Right Grip - Place Block</li>
            <li>Left Grip - Remove Block</li>
            <li>A Button - Jump</li>
            <li>B Button - Select Block Type</li>
        </ul>
        <div id="connection-status" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);">
            <span id="status-dot" style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; background-color: #ff0000;"></span>
            <span id="status-text" style="font-size: 12px;">Disconnected</span>
        </div>
    </div>
    <button id="enter-vr-button">Enter VR</button>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
